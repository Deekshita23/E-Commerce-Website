<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>ShopEasy</h1>

        <input type="text" id="search" placeholder="Search products...">

        <div class="cart">
            🛒 Cart: <span id="cart-count">0</span>
        </div>
    </header>

    <section class="products" id="product-list">

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1000&auto=format&fit=crop" alt="Shoes">
            <h2>Nike Shoes</h2>
            <p>₹2999</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1000&auto=format&fit=crop" alt="Tshirt">
            <h2>T-Shirt</h2>
            <p>₹999</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1000&auto=format&fit=crop" alt="Phone">
            <h2>Smart Phone</h2>
            <p>₹19999</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1000&auto=format&fit=crop" alt="Headphones">
            <h2>Headphones</h2>
            <p>₹2499</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

    </section>

    <script src="script.js"></script>
</body>
</html>
